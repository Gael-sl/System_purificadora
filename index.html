<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Purificadora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="auth">
      <div class="card">
        <h1>Ingreso</h1>
        <p class="sub">Acceso seguro para personal de la purificadora.</p>
        <div class="field">
          <label for="usuario">Usuario</label>
          <input id="usuario" type="text" placeholder="usuario" autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="••••••" autocomplete="current-password" />
        </div>
        <div class="field">
          <label for="rol">Rol</label>
          <select id="rol">
            <option value="admin">Administrador</option>
            <option value="repartidor">Repartidor</option>
          </select>
        </div>
        <button id="entrar">Entrar</button>
        <div id="auth-error" class="error"></div>
      </div>
    </div>
    <div id="layout" class="hidden">
      <aside id="sidebar">
        <div class="brand">Purificadora</div>
        <nav id="menu"></nav>
        <button id="logout" class="ghost">Salir</button>
      </aside>
      <main id="content">
        <header id="header">
          <div>
            <div class="label">Rol</div>
            <div id="user-role"></div>
          </div>
          <div>
            <div class="label">Fecha</div>
            <div id="today"></div>
          </div>
        </header>
        <section id="view"></section>
      </main>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
